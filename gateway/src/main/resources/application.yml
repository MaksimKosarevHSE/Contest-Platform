server:
  port: ${SERVER_PORT:8080}

auth:
  service:
    url: ${AUTH_SERVICE_URL:http://localhost:8005}

spring:
  application:
    name: api-gateway
  servlet:
    multipart:
      enabled: true
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://auth-service:8003
          predicates:
            - Path=/api/auth/**

        - id: problem-contest-service
          uri: http://problem-service:8000
          predicates:
            - Path=/api/contests/**,/api/contest/**,/api/problem/**,/api/problems/**,

        - id: submission-service
          uri: http://submission-service:8001
          predicates:
            - Path=/api/sub/**,/ws/**

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOrigins: [ "*" ]
            allowedMethods: [ GET, POST, OPTIONS, PUT, DELETE ]
            allowedHeaders: [ "*" ]