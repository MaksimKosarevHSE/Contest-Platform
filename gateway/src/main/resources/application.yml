spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8003
          predicates:
            - Path=/api/auth/**
        - id: problem-contest-service
          uri: ${PROBLEM_SERVICE_URL}
          predicates:
            - Path=/api/contests/**,/api/contest/**
        #            - Path=api/contest/**, api/contests/**,api/problem/**,api/problems/**
        - id: submission-service
          uri: http://localhost:8001
          predicates:
            - Path=/api/submissions
        - id: judging-service
          uri: http://localhost:8002
          predicates:
            - Path=/api/judgements/**
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOrigins: [ "*" ]
            allowedMethods: [ GET, POST, OPTIONS, PUT, DELETE ]
            allowedHeaders: [ "*" ]



server:
  port: ${SERVER_PORT:8080}

auth:
  service:
    url: ${AUTH_SERVICE_URL:http://localhost:8005}
