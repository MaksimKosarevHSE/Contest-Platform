spring.application.name=auto-service

server.port=${SERVER_PORT:8003}

security.jwt.secret=${JWT_SECRET:very-very-secret-key-min-256-bytes-required}
security.jwt.expiration=${JWT_EXPIRATION_MILLIS:1800000}
security.refresh.expiration=${REFRESH_EXPIRATION_MILLIS:2629746000}
security.bcrypt.rounds=${BCRYPT_ROUNDS:10}

spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres}

spring.data.redis.host=${REDIS_URL:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:qwerty}

spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:/db/db.changelog-master.xml
